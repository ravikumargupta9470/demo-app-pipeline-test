apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-demo-app-test1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      labels:
        app: springboot
    spec:
      containers:
        - name: springboot
          image: ravikumargupta9470/demo-app:v1
          ports:
            - containerPort: 5000
